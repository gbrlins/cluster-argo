# infra/clusters/cluster-argo/cluster.yaml
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: cluster-argo
  annotations:
    field.cattle.io/description: Criado automaticamente pelo ArgoCD
    cloudprovider.harvesterhci.io/ipam: dhcp
  labels: {}
  namespace: fleet-default
spec:
  cloudCredentialSecretName: cattle-global-data:cc-kl7d9
  clusterAgentDeploymentCustomization:
    appendTolerations: []
    overrideAffinity: {}
    overrideResourceRequirements: {}
  defaultPodSecurityAdmissionConfigurationTemplateName: ''
  fleetAgentDeploymentCustomization:
    appendTolerations: []
    overrideAffinity: {}
    overrideResourceRequirements: {}
  kubernetesVersion: v1.34.5+rke2r1
  localClusterAuthEndpoint:
    enabled: false
  rkeConfig:
    additionalManifest: |2-
       apiVersion: helm.cattle.io/v1
       kind: HelmChart
       metadata:
          name: harvester-cloud-provider
          namespace: kube-system
       spec:
          targetNamespace: kube-system
          bootstrap: true
          repo: https://raw.githubusercontent.com/rancher/charts/dev-v2.9
          chart: harvester-cloud-provider
          version:  104.0.2+up0.2.6
          helmVersion: v3
          valuesContent: |-
            global:
              cattle:
                clusterName: cluster-argo
    chartValues:
      harvester-cloud-provider:
        global:
          cattle:
            clusterName: cluster-argo
        cloudConfigPath: /var/lib/rancher/rke2/etc/config-files/cloud-provider-config
      rke2-calico: {}
    dataDirectories:
      k8sDistro: ''
      provisioning: ''
      systemAgent: ''
    etcd:
      disableSnapshots: true
      snapshotRetention: 5
      snapshotScheduleCron: 0 */5 * * *
    machineGlobalConfig:
      cni: calico
      disable-kube-proxy: false
      etcd-expose-metrics: false
    machinePools:
      - name: pool1
        etcdRole: true
        controlPlaneRole: true
        workerRole: true
        hostnamePrefix: ''
        quantity: 1
        unhealthyNodeTimeout: 0m
        machineConfigRef:
          kind: HarvesterConfig
          name: nc-cluster-argo-pool1-wx6nj
        drainBeforeDelete: true
        labels: {}
    machineSelectorConfig:
      - config:
          cloud-provider-config: secret://fleet-default:harvesterconfigk7bcc
          cloud-provider-name: harvester
          protect-kernel-defaults: false
    networking: {}
    registries:
      configs: {}
      mirrors: {}
    upgradeStrategy:
      controlPlaneConcurrency: '1'
      controlPlaneDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
      workerConcurrency: '1'
      workerDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
  machineSelectorConfig:
    - config: {}
---
apiVersion: rke-machine-config.cattle.io/v1
kind: HarvesterConfig
metadata:
  name: nc-cluster-argo-pool1-wx6nj
  namespace: fleet-default
  annotations:
    field.cattle.io/creatorId: user-xtskb
cpuCount: '2'
memorySize: '4'
diskInfo: '{"disks":[{"imageName":"default/image-l4c8b","bootOrder":1,"size":40}]}'
networkInfo: '{"interfaces":[{"networkName":"default/local-net","macAddress":""}]}'
sshUser: sles
sshPort: '22'
vmNamespace: techday
reservedMemorySize: '-1'
cpuPinning: false
