# infra/clusters/teste/cluster.yaml
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: teste
  namespace: fleet-default
spec:
  cloudCredentialSecretName: cattle-global-data:cc-kl7d9
  defaultPodSecurityAdmissionConfigurationTemplateName: ''
  kubernetesVersion: v1.34.4+rke2r1
  localClusterAuthEndpoint:
    enabled: false
  rkeConfig:
    chartValues:
      harvester-cloud-provider:
        global:
          cattle:
            clusterName: teste
        cloudConfigPath: /var/lib/rancher/rke2/etc/config-files/cloud-provider-config
      rke2-calico: {}
    dataDirectories:
      k8sDistro: ''
      provisioning: ''
      systemAgent: ''
    etcd:
      disableSnapshots: false
      snapshotRetention: 5
      snapshotScheduleCron: 0 */5 * * *
    machineGlobalConfig:
      cni: calico
      disable-kube-proxy: false
      etcd-expose-metrics: false
    machinePools:
      - name: pool1
        etcdRole: true
        controlPlaneRole: true
        workerRole: true
        hostnamePrefix: ''
        quantity: 1
        unhealthyNodeTimeout: 0m
        machineConfigRef:
          kind: HarvesterConfig
          name: nc-teste-pool1-5wx9f # Referência à configuração da máquina
        drainBeforeDelete: true
    machineSelectorConfig:
      - config:
          cloud-provider-config: secret://fleet-default:harvesterconfigbxbj9
          cloud-provider-name: harvester
          protect-kernel-defaults: false
    upgradeStrategy:
      controlPlaneConcurrency: '1'
      controlPlaneDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
      workerConcurrency: '1'
      workerDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
---
apiVersion: rke-machine-config.cattle.io/v1
kind: HarvesterConfig
metadata:
  name: nc-teste-pool1-5wx9f # TEM DE SER IGUAL AO NOME ACIMA
  namespace: fleet-default
spec:
  vmNamespace: default
  cpuCount: "2"
  memorySize: "4"
  diskSize: "40"
  diskBus: "virtio"
  imageName: "default/image-xxxxx" # Ajuste para a sua imagem Harvester
  networkName: "default/sua-rede"  # Ajuste para a sua rede Harvester
  sshUser: "ubuntu"