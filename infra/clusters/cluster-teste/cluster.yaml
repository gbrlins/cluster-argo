# infra/clusters/cluster-argo/cluster.yaml
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: cluster-argo
  annotations: {}
  labels: {}
  namespace: fleet-default
spec:
  cloudCredentialSecretName: cattle-global-data:cc-kl7d9
  clusterAgentDeploymentCustomization:
    appendTolerations: []
    overrideAffinity: {}
    overrideResourceRequirements: {}
  defaultPodSecurityAdmissionConfigurationTemplateName: ''
  fleetAgentDeploymentCustomization:
    appendTolerations: []
    overrideAffinity: {}
    overrideResourceRequirements: {}
  kubernetesVersion: v1.34.5+rke2r1
  localClusterAuthEndpoint:
    enabled: false
  rkeConfig:
    additionalManifest: |-
      apiVersion: helm.cattle.io/v1
      kind: HelmChart
      metadata:
        name: harvester-cloud-provider
        namespace: kube-system
      spec:
        targetNamespace: kube-system
        bootstrap: true
        repo: https://raw.githubusercontent.com/rancher/charts/dev-v2.9
        chart: harvester-cloud-provider
        version:  104.0.2+up0.2.6
        helmVersion: v3
        valuesContent: |-
          global:
            cattle:
              clusterName: cluster-argo
      ---
      apiVersion: helm.cattle.io/v1
      kind: HelmChart
      metadata:
        name: snapshot-controller-crds
        namespace: kube-system
      spec:
        chart: snapshot-controller-crds
        repo: https://piraeus.io/helm-charts/
        targetNamespace: kube-system
        bootstrap: true
    chartValues:
      harvester-cloud-provider:
        global:
          cattle:
            clusterName: cluster-argo
        cloudConfigPath: /var/lib/rancher/rke2/etc/config-files/cloud-provider-config
      rke2-calico: {}
    dataDirectories:
      k8sDistro: ''
      provisioning: ''
      systemAgent: ''
    etcd:
      disableSnapshots: true
      snapshotRetention: 5
      snapshotScheduleCron: 0 */5 * * *
    machineGlobalConfig:
      cni: calico
      disable-kube-proxy: false
      etcd-expose-metrics: false
    machinePools:
      - name: pool1
        etcdRole: true
        controlPlaneRole: true
        workerRole: true
        hostnamePrefix: ''
        quantity: 1
        unhealthyNodeTimeout: 0m
        machineConfigRef:
          kind: HarvesterConfig
          name: nc-cluster-argo-pool1-jjbc9
        drainBeforeDelete: true
        labels: {}
    machineSelectorConfig:
      - config:
          cloud-provider-config: secret://fleet-default:harvesterconfig5pbkw
          cloud-provider-name: harvester
          protect-kernel-defaults: false
    networking: {}
    registries:
      configs: {}
      mirrors: {}
    upgradeStrategy:
      controlPlaneConcurrency: '1'
      controlPlaneDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
      workerConcurrency: '1'
      workerDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
  machineSelectorConfig:
    - config: {}
---
