# infra/clusters/cluster-argo/cluster.yaml
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: cluster-argo
  annotations:
    field.cattle.io/description: Criado pelo argo
  namespace: fleet-default
spec:
  cloudCredentialSecretName: cattle-global-data:cc-zs2c6
  clusterAgentDeploymentCustomization:
    appendTolerations:
    overrideAffinity:
    overrideResourceRequirements:
  defaultPodSecurityAdmissionConfigurationTemplateName: ''
  fleetAgentDeploymentCustomization:
    appendTolerations:
    overrideAffinity:
    overrideResourceRequirements:
  kubernetesVersion: v1.34.5+rke2r1
  localClusterAuthEndpoint:
    enabled: false
  rkeConfig:
    additionalManifest: |2-
        apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: harvester-cloud-provider
          namespace: kube-system
        spec:
          targetNamespace: kube-system
          bootstrap: true
          repo: https://raw.githubusercontent.com/rancher/charts/dev-v2.9
          chart: harvester-cloud-provider
          version:  104.0.2+up0.2.6
          helmVersion: v3
          valuesContent: |-
            global:
              cattle:
                clusterName: cluster-argo
    chartValues:
      harvester-cloud-provider:
        global:
          cattle:
            clusterName: cluster-argo
        cloudConfigPath: /var/lib/rancher/rke2/etc/config-files/cloud-provider-config
      rke2-calico: {}
    dataDirectories:
      k8sDistro: ''
      provisioning: ''
      systemAgent: ''
    etcd:
      disableSnapshots: false
      snapshotRetention: 5
      snapshotScheduleCron: 0 */5 * * *
    machineGlobalConfig:
      cni: calico
      disable-kube-proxy: false
      etcd-expose-metrics: false
    machinePools:
      - name: argo
        etcdRole: true
        controlPlaneRole: true
        workerRole: true
        hostnamePrefix: ''
        quantity: 1
        unhealthyNodeTimeout: 0m
        machineConfigRef:
          kind: HarvesterConfig
          name: nc-cluster-argo-argo-twgnk
        drainBeforeDelete: true
        labels: {}
    machineSelectorConfig:
      - config:
          cloud-provider-config: secret://fleet-default:harvesterconfigxdcbv
          cloud-provider-name: harvester
          protect-kernel-defaults: false
    networking:
    registries:
      configs: {}
      mirrors: {}
    upgradeStrategy:
      controlPlaneConcurrency: '1'
      controlPlaneDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
      workerConcurrency: '1'
      workerDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
  machineSelectorConfig:
    - config: {}
__clone: true

---
apiVersion: rke-machine-config.cattle.io/v1
kind: HarvesterConfig
metadata:
  name: nc-cluster-argo-argo-twgnk
  namespace: fleet-default
cloudConfig: ''
clusterId: ''
clusterName: ''
clusterType: ''
cpuCount: '2'
cpuPinning: false
diskBus: ''
diskInfo: '{"disks":[{"imageName":"images/image-crplc","bootOrder":1,"size":40}]}'
diskSize: '0'
enableEfi: false
enableSecureBoot: false
enableTpm: false
imageName: ''
isolateEmulatorThread: false
keyPairName: ''
kubeconfigContent: ''
memorySize: '4'
networkData: |
  #cloud-config
  network:
    version: 1
    config:
      - type: physical
        name: eth0
        subnets:
          - type: dhcp
networkInfo: '{"interfaces":[{"networkName":"network/vm-net","macAddress":""}]}'
networkModel: ''
networkName: ''
networkType: ''
reservedMemorySize: '-1'
sshPassword: ''
sshPort: '22'
sshPrivateKeyPath: ''
sshUser: sles
userData: >-
  
vgpuInfo: ''
vmAffinity: ''
vmNamespace: techday
