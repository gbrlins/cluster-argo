apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: cluster-argo
  namespace: fleet-default
  annotations:
    field.cattle.io/description: Criado automaticamente pelo argo
spec:
  cloudCredentialSecretName: cattle-global-data:cc-kl7d9
  defaultPodSecurityAdmissionConfigurationTemplateName: ''
  kubernetesVersion: v1.34.4+rke2r1
  localClusterAuthEndpoint:
    enabled: false
  rkeConfig:
    # Injeção manual do Harvester Cloud Provider no RKE2
    additionalManifest: |
      ---
      apiVersion: helm.cattle.io/v1
      kind: HelmChart
      metadata:
        name: harvester-cloud-provider
        namespace: kube-system
      spec:
        targetNamespace: kube-system
        bootstrap: true
        repo: [https://charts.harvesterhci.io/](https://charts.harvesterhci.io/)
        chart: harvester-cloud-provider
    chartValues:
      harvester-cloud-provider:
        global:
          cattle:
            clusterName: cluster-argo
        cloudConfigPath: /var/lib/rancher/rke2/etc/config-files/cloud-provider-config
      rke2-calico: {}
    dataDirectories:
      k8sDistro: ''
      provisioning: ''
      systemAgent: ''
    etcd:
      disableSnapshots: true
      snapshotRetention: 5
      snapshotScheduleCron: 0 */5 * * *
    machineGlobalConfig:
      cni: calico
      disable-kube-proxy: false
      etcd-expose-metrics: false
    machinePools:
      - name: argo
        etcdRole: true
        controlPlaneRole: true
        workerRole: true
        hostnamePrefix: ''
        quantity: 1
        unhealthyNodeTimeout: 0m
        machineConfigRef:
          kind: HarvesterConfig
          name: nc-cluster-argo-argo-2s5b9 # Referência à configuração da máquina
        drainBeforeDelete: true
    machineSelectorConfig:
      - config:
          cloud-provider-config: secret://fleet-default:harvesterconfigskvrm
          cloud-provider-name: harvester
          protect-kernel-defaults: false
    upgradeStrategy:
      controlPlaneConcurrency: '1'
      controlPlaneDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
      workerConcurrency: '1'
      workerDrainOptions:
        deleteEmptyDirData: true
        disableEviction: false
        enabled: false
        force: false
        gracePeriod: -1
        ignoreDaemonSets: true
        skipWaitForDeleteTimeoutSeconds: 0
        timeout: 120
---
apiVersion: rke-machine-config.cattle.io/v1
kind: HarvesterConfig
metadata:
  name: nc-cluster-argo-argo-2s5b9 # TEM DE SER IGUAL AO NOME ACIMA
  namespace: fleet-default
cpuCount: '2'
diskInfo: '{"disks":[{"imageName":"labs/image-6f7mx","bootOrder":1,"size":40}]}'
memorySize: '4'
networkData: >-
  I2Nsb3VkLWNvbmZpZwpuZXR3b3JrOgogIHZlcnNpb246IDEKICBjb25maWc6CiAgICAtIHR5cGU6IHBoeXNpY2FsCiAgICAgIG5hbWU6IGV0aDAKICAgICAgc3VibmV0czoKICAgICAgICAtIHR5cGU6IGRoY3A=
networkInfo: '{"interfaces":[{"networkName":"default/local-net","macAddress":""}]}'
sshPort: '22'
sshUser: sles
userData: >-
  
vmNamespace: techday
